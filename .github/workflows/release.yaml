name: Release

on:
    push:
        branches: [main]

jobs:
    release:
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0 # нужно для git tag --sort

            - name: Determine bump type
              id: bump
              run: |
                  MSG="${{ github.event.head_commit.message }}"
                  if echo "$MSG" | grep -qi '\[major\]'; then
                    echo "type=major" >> "$GITHUB_OUTPUT"
                  elif echo "$MSG" | grep -qi '\[minor\]'; then
                    echo "type=minor" >> "$GITHUB_OUTPUT"
                  else
                    echo "type=patch" >> "$GITHUB_OUTPUT"
                  fi

            - name: Compute next version
              id: version
              run: |
                  # берём последний тег вида vX.Y.Z, или стартуем с v0.0.0
                  LAST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
                  LAST=${LAST:-v0.0.0}

                  MAJOR=$(echo $LAST | cut -d. -f1 | tr -d v)
                  MINOR=$(echo $LAST | cut -d. -f2)
                  PATCH=$(echo $LAST | cut -d. -f3)

                  case "${{ steps.bump.outputs.type }}" in
                    major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
                    minor) MINOR=$((MINOR+1)); PATCH=0 ;;
                    patch) PATCH=$((PATCH+1)) ;;
                  esac

                  echo "value=v$MAJOR.$MINOR.$PATCH" >> "$GITHUB_OUTPUT"

            - name: Tag and push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag ${{ steps.version.outputs.value }}
                  git push origin ${{ steps.version.outputs.value }}
